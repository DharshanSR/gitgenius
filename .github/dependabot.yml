# Dependabot configuration for automated updates
version: 2
updates:
  # Enable npm dependency updates
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "monthly"  # Changed from weekly to monthly
    open-pull-requests-limit: 3  # Reduced from 10 to 3
    labels:
      - "dependencies"
      - "npm"
      - "security"
    milestone: 1
    assignees:
      - "DharshanSR"
    reviewers:
      - "DharshanSR"
    commit-message:
      prefix: "deps"
      prefix-development: "chore"
      include: "scope"
    groups:
      # Group dependencies to reduce PR count
      dependencies:
        patterns:
          - "*"
        exclude-patterns:
          - "@types/*"  # Keep type definitions separate
      dev-dependencies:
        dependency-type: "development"
    
  # Enable GitHub Actions workflow updates  
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 2  # Added limit to prevent spam
    labels:
      - "dependencies"
      - "github-actions"
    assignees:
      - "DharshanSR"
    reviewers:
      - "DharshanSR"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      # Group all GitHub Actions updates together
      actions:
        patterns:
          - "*"

# Note: This configuration will create much fewer PRs:
# - Monthly schedule (12 times/year instead of 52)
# - Maximum 3 npm PRs + 2 Actions PRs = 5 total PRs max
# - Dependencies are grouped together to reduce individual PRs
